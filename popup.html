<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Maps AI Review</title>
        <style>
            :root {
                --primary: #1a73e8;
                --bg: #f8f9fa;
                --text: #202124;
                --border: #dadce0;
                --radius: 8px;
            }

            body {
                font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
                width: 350px;
                margin: 0;
                padding: 16px;
                background-color: var(--bg);
                color: var(--text);
            }

            h2 {
                font-size: 18px;
                margin-top: 0;
                margin-bottom: 16px;
                color: var(--primary);
                text-align: center;
            }

            .card {
                background: white;
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 12px;
                margin-bottom: 12px;
                box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            }

            .field-group {
                margin-bottom: 12px;
            }

            label {
                display: block;
                font-size: 12px;
                font-weight: 600;
                margin-bottom: 4px;
                color: #5f6368;
            }

            input,
            select,
            textarea {
                width: 100%;
                box-sizing: border-box;
                padding: 8px;
                border: 1px solid var(--border);
                border-radius: 4px;
                font-family: inherit;
                font-size: 14px;
            }

            textarea {
                resize: vertical;
                min-height: 80px;
            }

            button {
                width: 100%;
                background-color: var(--primary);
                color: white;
                border: none;
                padding: 10px;
                border-radius: var(--radius);
                font-weight: 600;
                cursor: pointer;
                transition: background 0.2s;
            }

            button:hover {
                background-color: #1557b0;
            }

            button:disabled {
                background-color: #a0c3ff;
                cursor: not-allowed;
            }

            .place-info {
                font-size: 13px;
            }

            .place-info strong {
                display: block;
                font-size: 15px;
                margin-bottom: 4px;
                color: var(--text);
            }

            .hidden {
                display: none;
            }

            .error {
                color: #d93025;
                font-size: 12px;
                margin-bottom: 12px;
            }

            .loader {
                text-align: center;
                font-size: 13px;
                color: var(--primary);
                display: none;
                margin: 10px 0;
            }

            .helper-text {
                font-size: 12px;
                color: #5f6368;
                margin-top: 4px;
                line-height: 1.4;
            }
        </style>
    </head>

    <body>
        <h2>AI Review Generator</h2>

        <div class="card">
            <div class="field-group">
                <label for="apiKey">Gemini API Key (Saved locally)</label>
                <input type="password" id="apiKey" placeholder="Enter your Gemini API key...">
            </div>
        </div>

        <div id="statusMessage" class="error hidden"></div>

        <div id="placeCard" class="card hidden">
            <label>Detected Place</label>
            <div class="place-info">
                <strong id="placeName">Loading...</strong>
                <span id="placeAddress"></span>
            </div>
        </div>

        <div class="card">
            <div class="field-group">
                <label for="sentiment">Review Type</label>
                <select id="sentiment">
                    <option value="Positive">Positive (5 Stars)</option>
                    <option value="Average">Average (3 Stars)</option>
                    <option value="Negative">Negative (1 Star)</option>
                    <option value="Funny">Funny & Witty</option>
                </select>
            </div>
            <div class="field-group">
                <label for="personaStyle">Persona Style</label>
                <select id="personaStyle">
                    <option value="Local Guide" selected>Local Guide</option>
                    <option value="Food Critic">Food Critic</option>
                    <option value="Traveler">Traveler</option>
                    <option value="Family Visitor">Family Visitor</option>
                    <option value="Business Visitor">Business Visitor</option>
                </select>
            </div>
            <div class="field-group">
                <label for="languageMode">Review Language</label>
                <select id="languageMode">
                    <option value="auto" selected>Auto (Local if relevant)</option>
                    <option value="en">English</option>
                    <option value="local">Dominant local language</option>
                </select>
            </div>
            <div class="field-group">
                <label for="reviewLength">Review Length</label>
                <select id="reviewLength">
                    <option value="short">Short (1-2 sentences)</option>
                    <option value="medium" selected>Medium (3-4 sentences)</option>
                    <option value="long">Long (Detailed paragraph)</option>
                </select>
            </div>
            <div class="field-group">
                <label for="imageQuality">Image Quality</label>
                <select id="imageQuality">
                    <option value="512">0.5K (512)</option>
                    <option value="1K" selected>1K</option>
                    <option value="2K">2K</option>
                    <option value="4K">4K</option>
                </select>
            </div>
            <div class="field-group">
                <label for="aspectRatio">Aspect Ratio</label>
                <select id="aspectRatio">
                    <option value="1:1" selected>1:1</option>
                    <option value="1:4">1:4</option>
                    <option value="1:8">1:8</option>
                    <option value="2:3">2:3</option>
                    <option value="3:2">3:2</option>
                    <option value="3:4">3:4</option>
                    <option value="4:1">4:1</option>
                    <option value="4:3">4:3</option>
                    <option value="4:5">4:5</option>
                    <option value="5:4">5:4</option>
                    <option value="8:1">8:1</option>
                    <option value="9:16">9:16</option>
                    <option value="16:9">16:9</option>
                    <option value="21:9">21:9</option>
                </select>
            </div>
            <div class="field-group">
                <label for="imageStyle">Image Style</label>
                <select id="imageStyle">
                    <option value="photorealistic" selected>Photorealistic</option>
                    <option value="cinematic">Cinematic</option>
                    <option value="golden-hour">Golden Hour</option>
                    <option value="night-vibrant">Night Vibrant</option>
                </select>
            </div>
            <div class="field-group">
                <label for="responseMode">Response Mode</label>
                <select id="responseMode">
                    <option value="text-image" selected>Text + Image</option>
                    <option value="image-only">Image Only</option>
                </select>
            </div>
            <div class="field-group">
                <label for="thinkingLevel">Thinking Level</label>
                <select id="thinkingLevel">
                    <option value="minimal" selected>Minimal</option>
                    <option value="high">High</option>
                </select>
            </div>
            <div class="field-group">
                <label>
                    <input type="checkbox" id="includeThoughts">
                    Include thoughts in response
                </label>
                <div class="helper-text">Useful for debugging and advanced workflows.</div>
            </div>
            <div class="field-group">
                <label>
                    <input type="checkbox" id="useWebGrounding">
                    Ground image with Google Search web results
                </label>
            </div>
            <div class="field-group">
                <label>
                    <input type="checkbox" id="useImageGrounding">
                    Ground image with Google Search image results
                </label>
                <div class="helper-text">Not supported for people in image search grounding.</div>
            </div>
            <div class="field-group">
                <label for="referenceImages">Reference Images (optional)</label>
                <input type="file" id="referenceImages" accept="image/*" multiple>
                <div class="helper-text">Supports up to 14 images for advanced composition.</div>
            </div>
            <div class="field-group">
                <label for="userVibe">Additional Vibe/Context (Optional)</label>
                <textarea id="userVibe" placeholder="e.g., 'Loved the lasagna, but waiter was rude'"></textarea>
            </div>
            <button id="generateBtn">Generate AI Review</button>
            <div id="loader" class="loader">Generating with Gemini AI...</div>
        </div>

        <div id="resultsCard" class="card hidden">
            <div class="field-group">
                <label for="reviewOutput">Generated Review</label>
                <textarea id="reviewOutput" readonly></textarea>
                <button id="autoPasteBtn" style="margin-top: 8px; background-color: #0f9d58;">✨ Auto-Paste to Maps</button>
                <button id="copyReviewBtn" style="margin-top: 8px; background-color: #5f6368;">Copy Review</button>
            </div>
            <div class="field-group">
                <label for="promptOutput">Image Generation Prompt</label>
                <textarea id="promptOutput" readonly></textarea>
                <button id="remixImageBtn" style="margin-top: 8px; background-color: #1a73e8;">Remix Image Variation</button>
            </div>
            <div class="field-group">
                <label for="imgbbOutput">ImgBB URL</label>
                <input id="imgbbOutput" type="text" readonly placeholder="Image upload link will appear here">
                <button id="copyImgbbBtn" style="margin-top: 8px; background-color: #5f6368;">Copy ImgBB URL</button>
            </div>
            <div class="field-group preview-container">
                <label>Generated Image Preview</label>
                <img id="imagePreview" src="" alt="AI Generated visualization" style="width: 100%; border-radius: 4px; display: none;" />
                <button id="downloadImageBtn" style="margin-top: 8px; background-color: #0b8043;">Download Current Image</button>
            </div>
        </div>

        <div class="card">
            <label>Recent Generations</label>
            <div id="historyList" class="place-info">No generations yet.</div>
        </div>

        <script src="popup.js"></script>
    </body>

</html>
